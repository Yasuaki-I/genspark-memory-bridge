<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 380px;
      font-family: "Segoe UI", "Meiryo", sans-serif;
      font-size: 13px;
      color: #333;
      padding: 16px;
      background: #fafafa;
    }

    h1 {
      font-size: 15px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid #4a90d9;
      color: #2c3e50;
    }

    .section {
      margin-bottom: 16px;
      padding: 12px;
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
    }

    .section h2 {
      font-size: 13px;
      margin-bottom: 8px;
      color: #555;
    }

    label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
      margin-top: 8px;
    }

    .hint {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 12px;
    }

    button {
      display: block;
      width: 100%;
      padding: 8px;
      margin-top: 8px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      color: white;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-save-settings {
      background: #6c757d;
    }

    .btn-test-connection {
      background: #5a6268;
    }

    .btn-save-chat {
      background: #4a90d9;
    }

    .btn-load-context {
      background: #28a745;
    }

    .btn-copy-context {
      background: #17a2b8;
    }

    .btn-restore {
      background: #e65100;
      font-weight: bold;
    }

    button:hover:not(:disabled) {
      opacity: 0.9;
    }

    /* スピナー */
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 復元提案バナー（T2-3 方針D） */
    #restoreBanner {
      display: none;
      margin-bottom: 16px;
      padding: 12px;
      background: #fff3e0;
      border: 2px solid #e65100;
      border-radius: 6px;
    }

    #restoreBanner.active {
      display: block;
    }

    #restoreBanner .banner-title {
      font-size: 13px;
      font-weight: bold;
      color: #e65100;
      margin-bottom: 6px;
    }

    #restoreBanner .banner-desc {
      font-size: 12px;
      color: #555;
      margin-bottom: 8px;
    }

    /* 接続テスト結果 */
    #testResult {
      margin-top: 6px;
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
      word-break: break-all;
    }

    /* 専用結果エリア（消えずに残る） */
    #saveResult {
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
      word-break: break-all;
    }

    #saveResult.success {
      display: block;
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    #saveResult.error {
      display: block;
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    #saveResult a {
      color: #155724;
      font-weight: bold;
      text-decoration: underline;
    }

    #saveResult .label {
      font-weight: bold;
      display: block;
      margin-bottom: 2px;
    }

    #saveResult .path {
      font-family: Consolas, "Courier New", monospace;
      font-size: 11px;
      margin-bottom: 6px;
    }

    /* 既存ステータス（GitHub設定・コンテキスト復元用） */
    #status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
    }

    #status.success {
      display: block;
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    #status.error {
      display: block;
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    #status.info {
      display: block;
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }
  </style>
</head>
<body>

  <h1>Genspark Memory Bridge</h1>

  <!-- 復元提案バナー（T2-3 方針D） -->
  <div id="restoreBanner">
    <div class="banner-title">前回コンテキストを復元できます</div>
    <div class="banner-desc">
      新しいチャットを検知しました。ワンクリックで引き継ぎドキュメントをクリップボードにコピーします。
    </div>
    <button class="btn-restore" id="btnRestore">復元する（読み込み＋コピー）</button>
  </div>

  <!-- GitHub設定セクション -->
  <div class="section">
    <h2>GitHub設定</h2>

    <label>GitHubユーザー名</label>
    <input type="text" id="githubUser" placeholder="例: yasuaki">

    <label>リポジトリ名</label>
    <input type="text" id="githubRepo" value="genspark-memory-bridge">

    <label>Personal Access Token</label>
    <input type="password" id="githubToken" placeholder="github_pat_...">

    <button class="btn-save-settings" id="btnSaveSettings">設定を保存</button>
    <button class="btn-test-connection" id="btnTestConnection">接続テスト</button>
    <div id="testResult"></div>
  </div>

  <!-- チャット保存セクション（T1-6リニューアル） -->
  <div class="section">
    <h2>チャット保存</h2>

    <label>保存ファイル名（プレビュー・編集可）</label>
    <input type="text" id="saveFileName" placeholder="Gensparkチャット画面で開いてください">
    <div class="hint">空欄のまま保存すると自動生成名で保存されます</div>

    <button class="btn-save-chat" id="btnSaveChat">現在のチャットをGitHubに保存</button>

    <div id="saveResult"></div>
  </div>

  <!-- コンテキスト復元セクション（Phase 1互換として維持） -->
  <div class="section">
    <h2>コンテキスト復元（手動）</h2>

    <label>読み込む前回チャットファイル名</label>
    <input type="text" id="loadFileName" placeholder="例: KADOKAWA/KADOKAWA_034_2026-06-17.md">

    <button class="btn-load-context" id="btnLoadContext">コンテキストを読み込み</button>
    <button class="btn-copy-context" id="btnCopyContext">クリップボードにコピー</button>
  </div>

  <!-- ステータス表示（GitHub設定・コンテキスト復元用） -->
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
