<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 40px; background: #eee; font-family: sans-serif; }
.icon-set { display: flex; gap: 30px; align-items: end; }
.icon-box { text-align: center; }
.icon-box p { margin-top: 8px; font-size: 12px; color: #666; }
canvas { display: block; border: 1px solid #ccc; }
</style>
</head>
<body>
<h2>Genspark Memory Bridge - アイコン生成</h2>
<div class="icon-set">
  <div class="icon-box"><canvas id="c128" width="128" height="128"></canvas><p>128x128</p></div>
  <div class="icon-box"><canvas id="c48" width="48" height="48"></canvas><p>48x48</p></div>
  <div class="icon-box"><canvas id="c16" width="16" height="16"></canvas><p>16x16</p></div>
</div>
<br>
<button id="btnDownload">3ファイルをダウンロード</button>

<script>
function drawIcon(canvas) {
  const size = canvas.width;
  const ctx = canvas.getContext('2d');

  // 背景: 角丸四角
  const radius = size * 0.18;
  ctx.beginPath();
  ctx.moveTo(radius, 0);
  ctx.lineTo(size - radius, 0);
  ctx.quadraticCurveTo(size, 0, size, radius);
  ctx.lineTo(size, size - radius);
  ctx.quadraticCurveTo(size, size, size - radius, size);
  ctx.lineTo(radius, size);
  ctx.quadraticCurveTo(0, size, 0, size - radius);
  ctx.lineTo(0, radius);
  ctx.quadraticCurveTo(0, 0, radius, 0);
  ctx.closePath();
  ctx.fillStyle = '#4a90d9';
  ctx.fill();

  // テキスト "M"
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `bold ${size * 0.55}px "Segoe UI", Arial, sans-serif`;
  ctx.fillText('M', size / 2, size / 2 + size * 0.03);
}

drawIcon(document.getElementById('c128'));
drawIcon(document.getElementById('c48'));
drawIcon(document.getElementById('c16'));

document.getElementById('btnDownload').addEventListener('click', () => {
  ['128', '48', '16'].forEach(s => {
    const canvas = document.getElementById('c' + s);
    const link = document.createElement('a');
    link.download = 'icon-' + s + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
});
</script>
</body>
</html>
